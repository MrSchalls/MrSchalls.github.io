<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soup Squad — Midnight Roster</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="banner">
    <h1>Soup Squad</h1>
    <p class="subtitle-row">
      <span class="subtitle"></span>
      <button id="edit-settings-btn" class="icon-btn" data-edit-only title="Edit page text">✏️</button>
    </p>
  </header>

  <main>
    <section class="stats-panel">
      <div class="stats-col">
        <h2>Roles</h2>
        <div id="role-stats"></div>
      </div>
      <div class="stats-col">
        <h2>Classes</h2>
        <div id="class-stats"></div>
      </div>
      <div class="stats-col">
        <h2>Armor</h2>
        <div id="armor-stats"></div>
      </div>
      <div class="total-panel">
        <span id="total-count">Loading…</span>
      </div>
    </section>

    <nav id="role-filters" class="filters">
      <button class="filter-btn active" data-role="all">All</button>
      <button class="filter-btn" data-role="Tank">🛡 Tank</button>
      <button class="filter-btn" data-role="Healer">❤️ Healer</button>
      <button class="filter-btn" data-role="Melee">⚔️ Melee</button>
      <button class="filter-btn" data-role="Ranged">🏹 Ranged</button>
    </nav>

    <nav id="class-filters" class="filters"></nav>

    <button id="add-member-btn" class="filter-btn add-btn" data-edit-only>+ Add member</button>

    <section id="roster-grid" class="roster-grid"></section>

    <p id="footer-text" class="footer-text" style="display:none"></p>
  </main>

  <dialog id="member-form-dialog">
    <form id="member-form" method="dialog">
      <h2 id="form-title">Add member</h2>

      <label>Name<input type="text" name="name" required></label>

      <div class="form-row">
        <label>Main class<select name="main"></select></label>
        <label>Spec<select name="spec"></select></label>
      </div>

      <div class="form-row">
        <label>Second class<select name="second"></select></label>
        <label>Spec 2<select name="spec2"></select></label>
      </div>

      <label>Note<textarea name="note" rows="2"></textarea></label>

      <div class="form-actions">
        <button type="button" id="cancel-form">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="settings-form-dialog">
    <form id="settings-form" method="dialog">
      <h2>Edit page text</h2>

      <label>Subtitle<input type="text" name="subtitle"></label>
      <label>Footer text<textarea name="footerText" rows="2"></textarea></label>

      <div class="form-actions">
        <button type="button" id="cancel-settings-form">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <footer>
    <span id="status">Loading roster…</span>
  </footer>

<script src="js/data.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
